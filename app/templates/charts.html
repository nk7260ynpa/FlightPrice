{% extends "base.html" %}

{% block title %}價格圖表 - FlightPrice{% endblock %}

{% block extra_head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
{% endblock %}

{% block content %}
<h2>價格趨勢圖表</h2>

<div class="card mb-4">
    <div class="card-body">
        <form method="GET" action="{{ url_for('charts.index') }}" class="row g-3 align-items-end">
            <div class="col-md-6">
                <label for="flight_id" class="form-label">選擇班機</label>
                <select class="form-select" id="flight_id" name="flight_id" onchange="this.form.submit()">
                    <option value="">-- 請選擇班機 --</option>
                    {% for flight in flights %}
                    <option value="{{ flight.id }}"
                            {% if selected_id == flight.id %}selected{% endif %}>
                        {{ flight.flight_number }} ({{ flight.airline }} {{ flight.origin }} → {{ flight.destination }}) {{ flight.departure_date.strftime('%Y-%m-%d') if flight.departure_date else '' }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </form>
    </div>
</div>

{% if selected_id %}
<div class="card mb-4">
    <div class="card-body">
        <canvas id="priceChart" height="100"></canvas>
    </div>
</div>

<div id="statsContainer" class="row g-3 mb-4" style="display: none;">
    <div class="col-md-4">
        <div class="stat-scoot stat-scoot--danger">
            <div class="stat-scoot-label">最高價</div>
            <div id="maxPrice" class="stat-scoot-value">-</div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="stat-scoot stat-scoot--success">
            <div class="stat-scoot-label">最低價</div>
            <div id="minPrice" class="stat-scoot-value">-</div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="stat-scoot stat-scoot--ink">
            <div class="stat-scoot-label">平均價</div>
            <div id="avgPrice" class="stat-scoot-value">-</div>
        </div>
    </div>
</div>

<div id="noDataMessage" class="alert alert-info" style="display: none;">
    尚無價格資料
</div>
{% endif %}
{% endblock %}

{% block extra_scripts %}
{% if selected_id %}
<script>
/**
 * 從當前 <html data-theme> 的 CSS custom properties 讀取主題色。
 * 所有 Chart.js 色彩 MUST 透過本函式動態取得；不得硬編色碼。
 * @returns {Object} 主題色 map
 */
function readThemeColors() {
    const cs = getComputedStyle(document.documentElement);
    // 所有色彩皆來自 --theme-* tokens，CSS 已備 :root:not([data-theme])
    // fallback，故無需於此處提供硬編 hex fallback。
    const ink = cs.getPropertyValue('--theme-ink').trim();
    const primary = cs.getPropertyValue('--theme-primary').trim();
    const slate = cs.getPropertyValue('--theme-slate').trim();
    return {
        ink: ink,
        primary: primary,
        slate: slate,
        // ink 衍生透明度：以 currentColor 風格產生 rgba
        inkAlpha08: hexWithAlpha(ink, 0.08),
        inkAlpha06: hexWithAlpha(ink, 0.06),
    };
}

/**
 * 將 #RRGGBB 轉為 rgba(...)；若非 hex（例 hsl/var 等）回傳帶透明度 fallback。
 * @param {string} hex 色碼字串（通常為 #RRGGBB）
 * @param {number} alpha 0-1 之間的透明度
 * @returns {string} rgba(...)
 */
function hexWithAlpha(hex, alpha) {
    const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex.trim());
    if (!m) {
        // 非預期格式：回傳完全透明以避免影響圖表可讀性。
        return 'rgba(0, 0, 0, ' + alpha + ')';
    }
    const r = parseInt(m[1], 16);
    const g = parseInt(m[2], 16);
    const b = parseInt(m[3], 16);
    return 'rgba(' + r + ', ' + g + ', ' + b + ', ' + alpha + ')';
}

/**
 * 依主題色產生 Chart.js 配色物件（套用至 dataset 與 options）。
 * @param {Object} colors readThemeColors() 回傳值
 * @returns {Object} 含 dataset / scales / plugins 三區塊的配色
 */
function buildChartColors(colors) {
    return {
        borderColor: colors.ink,
        backgroundColor: colors.inkAlpha08,
        pointBackgroundColor: colors.primary,
        pointBorderColor: colors.ink,
        gridColor: colors.inkAlpha06,
        tickColor: colors.slate,
        tooltipBg: colors.ink,
        tooltipTitle: '#ffffff',
        tooltipBody: colors.primary,
        legendColor: colors.ink,
    };
}

document.addEventListener('DOMContentLoaded', function() {
    fetch('{{ url_for("charts.chart_data", flight_id=selected_id) }}')
        .then(response => response.json())
        .then(data => {
            if (data.labels.length === 0) {
                document.getElementById('noDataMessage').style.display = 'block';
                return;
            }

            document.getElementById('statsContainer').style.display = 'flex';
            document.getElementById('maxPrice').textContent = 'NT$ ' + data.stats.max.toLocaleString();
            document.getElementById('minPrice').textContent = 'NT$ ' + data.stats.min.toLocaleString();
            document.getElementById('avgPrice').textContent = 'NT$ ' + data.stats.avg.toLocaleString();

            const ctx = document.getElementById('priceChart').getContext('2d');
            const themeColors = buildChartColors(readThemeColors());

            const chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.labels,
                    datasets: [{
                        label: '票價 (TWD)',
                        data: data.data,
                        borderColor: themeColors.borderColor,
                        backgroundColor: themeColors.backgroundColor,
                        fill: true,
                        tension: 0.3,
                        pointBackgroundColor: themeColors.pointBackgroundColor,
                        pointBorderColor: themeColors.pointBorderColor,
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        tooltip: {
                            backgroundColor: themeColors.tooltipBg,
                            titleColor: themeColors.tooltipTitle,
                            bodyColor: themeColors.tooltipBody,
                            borderColor: 'rgba(255,255,255,0.1)',
                            borderWidth: 1,
                            cornerRadius: 8,
                            padding: 10,
                            callbacks: {
                                label: function(context) {
                                    return 'NT$ ' + context.parsed.y.toLocaleString();
                                }
                            }
                        },
                        legend: {
                            labels: {
                                color: themeColors.legendColor,
                                font: { weight: '600' }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: { color: themeColors.gridColor },
                            ticks: {
                                color: themeColors.tickColor,
                                callback: function(value) {
                                    return 'NT$ ' + value.toLocaleString();
                                }
                            }
                        },
                        x: {
                            grid: { color: themeColors.gridColor },
                            ticks: { color: themeColors.tickColor }
                        }
                    }
                }
            });

            // 監聽主題切換事件：重讀 CSS tokens 後重繪圖表。
            document.addEventListener('themechange', function() {
                const updated = buildChartColors(readThemeColors());
                const ds = chart.data.datasets[0];
                ds.borderColor = updated.borderColor;
                ds.backgroundColor = updated.backgroundColor;
                ds.pointBackgroundColor = updated.pointBackgroundColor;
                ds.pointBorderColor = updated.pointBorderColor;

                chart.options.plugins.tooltip.backgroundColor = updated.tooltipBg;
                chart.options.plugins.tooltip.titleColor = updated.tooltipTitle;
                chart.options.plugins.tooltip.bodyColor = updated.tooltipBody;
                chart.options.plugins.legend.labels.color = updated.legendColor;
                chart.options.scales.y.grid.color = updated.gridColor;
                chart.options.scales.y.ticks.color = updated.tickColor;
                chart.options.scales.x.grid.color = updated.gridColor;
                chart.options.scales.x.ticks.color = updated.tickColor;

                chart.update();
            });
        });
});
</script>
{% endif %}
{% endblock %}
